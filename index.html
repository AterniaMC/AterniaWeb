<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATERNIA MC | OFICIAL</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://i.imgur.com/EpxuqFO.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://bsat999.github.io/skinview3d/bundle.js"></script>

    <style>
        :root {
            --bg: #0f0f0f; --card-bg: #1a1a1a; --sidebar-bg: #121212; --text: #ffffff;
            --accent: #00e5e5; --accent-dark: #008b8b; --accent-glow: rgba(0, 229, 229, 0.4);
            --lore-color: #ff7f27; --error: #ff4757;
        }
        [data-theme="light"] { --bg: #f4f4f4; --card-bg: #ffffff; --sidebar-bg: #e0e0e0; --text: #333; }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; text-transform: uppercase; min-height: 100vh; overflow-x: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 280px; background-color: var(--sidebar-bg); padding: 40px 20px; position: fixed; height: 100vh; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; transition: 0.4s; overflow-y: auto; box-sizing: border-box; }
        .logo-box { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-box img { width: 45px; filter: drop-shadow(0 0 5px var(--accent-glow)); }

        .nav-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.4s; color: #888; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 225, 225, 0.1); color: var(--accent); }
        .nav-item.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* CONTENT */
        .main-content { margin-left: 320px; padding: 60px; width: calc(100% - 320px); transition: 0.4s; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-bottom: 50px; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 25px; width: 95%; max-width: 450px; border: 2px solid var(--accent); box-shadow: 0 0 30px var(--accent-glow); animation: modalIn 0.3s; position: relative; box-sizing: border-box; }
        
        .profile-large { max-width: 850px; display: flex; flex-direction: row; gap: 30px; text-align: left; }
        .profile-skin-side { width: 280px; flex-shrink: 0; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #skin-container { width: 100%; height: 350px; }

        .modal-content h2 { margin-bottom: 20px; color: var(--accent); font-size: 1.2rem; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.08); border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; font-family: inherit; }
        
        .auth-error-msg { display: none; background: rgba(255, 71, 87, 0.1); border: 1px solid var(--error); color: var(--error); padding: 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 900; margin-bottom: 15px; text-align: center; }

        /* BOTONES */
        .btn-action { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-action:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-danger { background: rgba(255, 71, 87, 0.1); color: var(--error); border: 1px solid var(--error); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); padding: 35px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }

        .category-section { display: none; }
        .category-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 992px) {
            .sidebar { left: -320px; }
            .main-content { margin-left: 0; width: 100%; padding: 40px 20px; }
            .profile-large { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="logo-box" onclick="showCategory('inicio')">
            <img src="https://i.imgur.com/EpxuqFO.png" alt="Logo">
            <span style="color:var(--accent)">ATERNIA</span><span style="color:var(--accent-dark)">MC</span>
        </div>
        <div class="nav-item active" id="nav-inicio" onclick="showCategory('inicio')"><i class="fas fa-home"></i> INICIO</div>
        <div class="nav-item" id="nav-rangos" onclick="showCategory('rangos')"><i class="fas fa-crown"></i> RANGOS</div>
        <div class="nav-item" id="nav-llaves" onclick="showCategory('llaves')"><i class="fas fa-key"></i> LLAVES</div>
        <div class="nav-item" id="nav-staff" onclick="showCategory('staff')"><i class="fas fa-shield-alt"></i> STAFF</div>
        <div class="nav-item" id="nav-faq" onclick="showCategory('faq')"><i class="fas fa-comments"></i> FAQ</div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="authButtons">
                <button class="btn-action btn-outline" onclick="openAuth('REGISTRARSE')">REGISTRARSE</button>
                <button class="btn-action" onclick="openAuth('INICIAR SESIÓN')">INICIAR SESIÓN</button>
            </div>
            <div id="userLogged" style="display:none; align-items:center; gap:15px;">
                <span id="userTag" style="font-weight:900;"></span>
                <button class="btn-action btn-outline" onclick="openEditProfile()">MI PERFIL</button>
                <i class="fas fa-power-off" onclick="logout()" style="color:var(--error); cursor:pointer;"></i>
            </div>
        </div>

        <!-- SECCIONES -->
        <div id="inicio" class="category-section active">
            <h1>NOTICIAS <span style="color:var(--accent)">RECIENTES</span></h1>
            <div class="card"><h3>¡BIENVENIDOS A LA NUEVA WEB!</h3><p>Explora nuestras secciones y únete a la comunidad.</p></div>
        </div>

        <div id="rangos" class="category-section">
            <h1>NUESTROS <span style="color:var(--accent)">RANGOS</span></h1>
            <div class="grid" id="rangosContainer">
                <!-- Se llena con JS -->
            </div>
        </div>

        <div id="llaves" class="category-section">
            <h1>LLAVES <span style="color:var(--accent)">CRATES</span></h1>
            <div class="grid" id="llavesContainer">
                <!-- Se llena con JS -->
            </div>
        </div>

        <div id="staff" class="category-section">
            <h1>EQUIPO <span style="color:var(--accent)">STAFF</span></h1>
            <div class="grid">
                <div class="card" style="border: 2px solid gold;">
                    <img src="https://mc-heads.net/avatar/PERROLOLXD" style="width:80px; margin-bottom:10px;">
                    <h3 style="color:gold;">PERROLOLXD</h3>
                    <p>OWNER & DEV</p>
                </div>
            </div>
        </div>

        <div id="faq" class="category-section">
            <h1>PREGUNTAS <span style="color:var(--accent)">FRECUENTES</span></h1>
            <div id="faqList"></div>
        </div>
    </div>

    <!-- MODAL PERFIL -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content profile-large">
            <div class="profile-skin-side">
                <div id="skin-container"></div>
                <p id="mcNameDisplay" style="color:var(--accent); font-weight:bold;"></p>
                <button class="btn-action btn-danger" onclick="deleteAccount()" style="font-size:0.7rem; width:100%; margin-top:10px;">BORRAR CUENTA</button>
            </div>
            <div class="profile-info-side" style="flex:1;">
                <h2>CONFIGURAR PERFIL</h2>
                <div id="profileError" class="auth-error-msg"></div>
                
                <label for="editNickInput" style="font-size:0.6rem; color:#555;">NICKNAME ESTÉTICO</label>
                <input type="text" id="editNickInput" placeholder="TU APODO">

                <label for="editGender" style="font-size:0.6rem; color:#555;">GÉNERO</label>
                <select id="editGender">
                    <option value="No definido">NO DEFINIDO</option>
                    <option value="Hombre">HOMBRE</option>
                    <option value="Mujer">MUJER</option>
                </select>

                <label for="editBio" style="font-size:0.6rem; color:#555;">BIOGRAFÍA</label>
                <textarea id="editBio" rows="3"></textarea>

                <div style="display:flex; gap:10px;">
                    <button class="btn-action btn-outline" style="flex:1" onclick="closeEditProfile()">CERRAR</button>
                    <button class="btn-action" style="flex:1" onclick="updateProfile()">GUARDAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // CONFIG FIREBASE (Tus datos)
        const firebaseConfig = {
            apiKey: "AIzaSyCCQ_VYtiZB88PzpbOfA98wGqrG7k4qzSE",
            authDomain: "aterniamc-web.firebaseapp.com",
            projectId: "aterniamc-web",
            storageBucket: "aterniamc-web.firebasestorage.app",
            messagingSenderId: "748766671298",
            appId: "1:748766671298:web:bd934aa81b246b9e0ba65b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function showCategory(id) {
            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-'+id)?.classList.add('active');
        }

        // GENERAR CONTENIDO DINÁMICO
        window.onload = () => {
            const rangos = [
                {n:'VIP', p:'3.00', c:'#55efc4'},
                {n:'MVP', p:'7.00', c:'#0984e3'},
                {n:'ELITE', p:'15.00', c:'#6c5ce7'}
            ];
            const rangosDiv = document.getElementById('rangosContainer');
            rangos.forEach(r => {
                rangosDiv.innerHTML += `
                    <div class="card" style="border-bottom: 4px solid ${r.c}">
                        <h2 style="color:${r.c}">${r.n}</h2>
                        <p style="font-size:1.5rem; font-weight:900;">$${r.p} USD</p>
                        <a href="#" class="btn-action" style="background:${r.c}">COMPRAR</a>
                    </div>`;
            });

            const llaves = [
                {n:'COMÚN', p:'1.00', c:'#95a5a6'},
                {n:'EPICA', p:'5.00', c:'#a29bfe'}
            ];
            const llavesDiv = document.getElementById('llavesContainer');
            llaves.forEach(l => {
                llavesDiv.innerHTML += `
                    <div class="card">
                        <i class="fas fa-key" style="color:${l.c}; font-size:2rem;"></i>
                        <h3 style="color:${l.c}">${l.n}</h3>
                        <p>$${l.p} USD</p>
                        <button class="btn-action" style="background:${l.c}">ADQUIRIR</button>
                    </div>`;
            });
        };

        // LÓGICA DE PERFIL (Simplificada)
        let skinViewer = null;
        async function openEditProfile() {
            const user = auth.currentUser;
            const doc = await db.collection('users').doc(user.uid).get();
            const data = doc.data();
            
            document.getElementById('editNickInput').value = data.nickname;
            document.getElementById('mcNameDisplay').innerText = data.mc_user.toUpperCase();
            document.getElementById('editProfileModal').style.display = 'flex';

            if(!skinViewer) {
                skinViewer = new skinview3d.SkinViewer({
                    canvas: document.createElement("canvas"),
                    width: 250, height: 350
                });
                document.getElementById('skin-container').appendChild(skinViewer.canvas);
            }
            skinViewer.loadSkin(`https://mc-heads.net/skin/${data.mc_user}`);
        }

        function closeEditProfile() { document.getElementById('editProfileModal').style.display = 'none'; }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authButtons').style.display = 'none';
                document.getElementById('userLogged').style.display = 'flex';
                db.collection('users').doc(user.uid).get().then(doc => {
                    document.getElementById('userTag').innerText = doc.data().nickname;
                });
            }
        });

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
