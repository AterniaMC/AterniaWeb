<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATERNIA MC | OFICIAL</title>
    
    <!-- CONFIGURACIÓN DEL FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://i.imgur.com/EpxuqFO.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/EpxuqFO.png">
    
    <!-- META TAGS -->
    <meta property="og:title" content="ATERNIA MC | TIENDA OFICIAL" />
    <meta property="og:description" content="Adquiere rangos exclusivos y apoya al servidor oficial." />
    <meta property="og:image" content="https://i.imgur.com/EpxuqFO.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f0f0f; --card-bg: #1a1a1a; --sidebar-bg: #121212; --text: #ffffff;
            --accent: #00e5e5; --accent-dark: #008b8b; --accent-glow: rgba(0, 229, 229, 0.4);
            --lore-color: #ff7f27; 
            --comun: #95a5a6; --raro: #00d2d3; --epico: #8e44ad; 
            --legendary: #f1c40f; --mitico: #c0392b; --exotico: #ad244f;
            --error: #ff4757; --error-glow: rgba(255, 71, 87, 0.4);
        }

        [data-theme="light"] { --bg: #f4f4f4; --card-bg: #ffffff; --sidebar-bg: #e0e0e0; --text: #333; }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; text-transform: uppercase; transition: 0.3s; min-height: 100vh; overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { 
            width: 280px; background-color: var(--sidebar-bg); padding: 40px 20px; position: fixed; 
            height: 100vh; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; transition: 0.4s; overflow-y: auto; 
        }
        
        .logo-box { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-box img { width: 45px; filter: drop-shadow(0 0 5px var(--accent-glow)); }
        
        .nav-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.4s; color: #888; font-weight: 600; }
        .nav-item:hover { background: rgba(0, 225, 225, 0.1); color: var(--accent); transform: translateX(8px); }
        .nav-item.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); }

        /* SERVER STATUS */
        .server-status-card { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 20px; margin-top: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .ip-copy-box { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; cursor: pointer; position: relative; }
        .copy-tooltip { position: absolute; top: -30px; background: var(--accent); color: #000; padding: 4px 8px; border-radius: 5px; font-size: 0.6rem; opacity: 0; transition: 0.3s; }
        .copy-tooltip.show { opacity: 1; top: -35px; }

        .main-content { margin-left: 320px; padding: 60px; width: calc(100% - 320px); transition: 0.4s; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-bottom: 50px; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 25px; width: 90%; max-width: 450px; text-align: center; border: 2px solid var(--accent); position: relative; box-sizing: border-box; }
        
        .modal-profile { max-width: 750px !important; text-align: left !important; }
        .profile-grid { display: grid; grid-template-columns: 220px 1fr; gap: 30px; margin-top: 20px; }
        
        .modal-content input, .modal-content textarea, .modal-content select { 
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-family: inherit; 
        }

        .skin-container { width: 100%; height: 320px; background: rgba(0,0,0,0.2); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(255,255,255,0.1); }
        .skin-container img { height: 90%; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        .security-section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }

        .btn-action { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        
        .btn-topbar-edit { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--accent); color: var(--text); padding: 8px 15px; border-radius: 50px; font-size: 0.75rem; cursor: pointer; display: none; align-items: center; gap: 8px; }

        .theme-switch { position: relative; width: 55px; height: 28px; cursor: pointer; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(27px); }

        @media (max-width: 992px) {
            .sidebar { left: -320px; }
            .main-content { margin-left: 0; width: 100%; padding: 80px 20px; }
            .profile-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- MODAL INICIO SESIÓN -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">INICIAR SESIÓN</h2>
            <div id="authInputs">
                <input type="text" id="authUser" placeholder="USUARIO DE MINECRAFT">
                <input type="email" id="authEmail" placeholder="CORREO ELECTRÓNICO">
                <input type="password" id="authPass" placeholder="CONTRASEÑA">
            </div>
            <button class="btn-action" style="width: 100%; margin-top: 15px;" onclick="handleAuth()">CONTINUAR</button>
            <p onclick="closeAuth()" style="font-size: 0.7rem; color: #555; margin-top: 15px; cursor: pointer;">CANCELAR</p>
        </div>
    </div>

    <!-- MODAL EDITAR PERFIL -->
    <div id="profileModal" class="modal">
        <div class="modal-content modal-profile">
            <h2 style="text-align: center; width: 100%; margin-bottom: 30px;">EDITAR PERFIL</h2>
            <div class="profile-grid">
                <div>
                    <div class="skin-container"><img id="profileSkinImg" src="" alt="Skin"></div>
                    <p id="profileRealName" style="text-align: center; font-size: 1.2rem; font-weight: 900; margin-top: 15px; color: var(--accent);"></p>
                </div>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <p style="font-size: 0.65rem; color: #555; margin:0;">APODO</p>
                    <input type="text" id="editNickname" placeholder="Tu apodo...">
                    <p style="font-size: 0.65rem; color: #555; margin:0;">GÉNERO</p>
                    <select id="editGender">
                        <option value="MASCULINO">MASCULINO</option>
                        <option value="FEMENINO">FEMENINO</option>
                        <option value="OTRO">OTRO</option>
                    </select>
                    <p style="font-size: 0.65rem; color: #555; margin:0;">DESCRIPCIÓN</p>
                    <textarea id="editBio" style="flex-grow: 1; min-height: 80px;" placeholder="Sobre ti..."></textarea>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 25px 0;">
            <h3 style="font-size: 0.8rem; margin-bottom: 15px;">SEGURIDAD</h3>
            <div class="security-section-grid">
                <input type="password" placeholder="Nueva contraseña">
                <input type="email" id="editEmail" placeholder="Nuevo correo">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px;">
                <button class="btn-action btn-outline" onclick="closeProfile()">CANCELAR</button>
                <button class="btn-action" onclick="saveProfile()">GUARDAR</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="logo-box">
            <img src="https://i.imgur.com/EpxuqFO.png" alt="Logo">
            <span>ATERNIA</span><span style="color:var(--accent-dark)">MC</span>
        </div>
        <div class="nav-item active" onclick="showCategory('inicio')"><i class="fas fa-home"></i> INICIO</div>
        <div class="nav-item" onclick="showCategory('rangos')"><i class="fas fa-crown"></i> RANGOS</div>
        
        <div class="server-status-card">
            <div class="ip-copy-box" onclick="copyIP()">
                <div id="copyTooltip" class="copy-tooltip">¡COPIADO!</div>
                <span id="serverIP" style="font-size: 0.6rem;">ATERNIAMC.ATERNOS.ME</span>
                <i class="fas fa-copy"></i>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">
        <div class="top-bar">
            <div id="userLogged" style="display:none; align-items:center; gap:15px;">
                <img id="headImg" src="" style="width:25px; border-radius:3px;">
                <span id="userTag" style="font-weight:900;"></span>
                <i class="fas fa-power-off" onclick="logout()" style="color:var(--error); cursor:pointer;"></i>
            </div>
            <div id="authButtons">
                <button class="btn-action" onclick="openAuth()">INICIAR SESIÓN</button>
            </div>
            <button id="btnEditProfile" class="btn-topbar-edit" onclick="openProfile()">
                <i class="fas fa-user-edit"></i> MI PERFIL
            </button>
            <label class="theme-switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
        </div>

        <div id="inicio" class="category-section active">
            <h1>BIENVENIDO A <span style="color:var(--accent)">ATERNIA MC</span></h1>
            <p>Selecciona una categoría en el menú lateral.</p>
        </div>
        
        <div id="rangos" class="category-section" style="display:none;">
            <h1>RANGOS EXCLUSIVOS</h1>
            <div class="btn-action">PRÓXIMAMENTE</div>
        </div>
    </div>

    <script>
        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }
        
        function handleAuth() {
            const user = document.getElementById('authUser').value || "Jugador";
            localStorage.setItem('u', user);
            location.reload();
        }

        function logout() { localStorage.removeItem('u'); location.reload(); }

        function openProfile() {
            const u = localStorage.getItem('u');
            document.getElementById('profileRealName').innerText = u;
            document.getElementById('profileSkinImg').src = `https://mc-heads.net/body/${u}`;
            document.getElementById('profileModal').style.display = 'flex';
        }
        function closeProfile() { document.getElementById('profileModal').style.display = 'none'; }
        function saveProfile() { alert('Perfil guardado'); closeProfile(); }

        function showCategory(id) {
            document.querySelectorAll('.category-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function copyIP() {
            navigator.clipboard.writeText("ATERNIAMC.ATERNOS.ME");
            const t = document.getElementById('copyTooltip');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        window.onload = () => {
            const u = localStorage.getItem('u');
            if(u) {
                document.getElementById('authButtons').style.display = 'none';
                document.getElementById('userLogged').style.display = 'flex';
                document.getElementById('btnEditProfile').style.display = 'flex';
                document.getElementById('userTag').innerText = u;
                document.getElementById('headImg').src = `https://mc-heads.net/avatar/${u}`;
            }
        };

        document.getElementById('theme-toggle').onclick = () => {
            const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
        };
    </script>
</body>
</html>
