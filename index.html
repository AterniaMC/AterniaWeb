<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aternia Network | Tienda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f4f4f4;
            --card-bg: #ffffff;
            --sidebar-bg: #e0e0e0;
            --text: #333333;
            --accent: #00e5e5; /* Cian brillante */
            --accent-dark: #004d4d; /* Cian oscuro */
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --sidebar-bg: #181818;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            min-height: 100vh;
            transition: 0.3s;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 30px 20px;
            position: fixed;
            height: 100%;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .logo-box { font-size: 2rem; font-weight: bold; text-align: center; margin-bottom: 40px; }
        .logo-main { color: var(--accent); }
        .logo-sub { color: var(--accent-dark); }

        .nav-item {
            padding: 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; }

        /* MAIN CONTENT */
        .main-content { margin-left: 290px; padding: 40px; width: 100%; }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* BOTONES LOGIN / REGISTRO */
        .auth-btns button {
            background: none;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .auth-btns button:hover { background: var(--accent); color: white; }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 6px 12px;
            border-radius: 50%;
        }

        /* ANIMACIÓN RANGOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

        .rank-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--accent);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        /* Efecto al pasar el mouse */
        .rank-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,229,229,0.3);
        }

        .price { font-size: 2.2rem; font-weight: bold; color: var(--accent); margin: 15px 0; }
        
        .btn-buy {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .category-section { display: none; }
        .category-section.active { display: block; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box">
            <span class="logo-main">Aternia</span><span class="logo-sub">MC</span>
        </div>
        <div class="nav-item active" onclick="showCategory('inicio')"><i class="fas fa-home"></i> Inicio</div>
        <div class="nav-item" onclick="showCategory('rangos')"><i class="fas fa-crown"></i> Rangos VIP</div>
        <div class="nav-item" onclick="showCategory('llaves')"><i class="fas fa-key"></i> Llaves Crates</div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="auth-btns">
                <button onclick="alert('Próximamente: Login')">Iniciar Sesión</button>
                <button onclick="alert('Próximamente: Registro')">Registrarse</button>
            </div>
            <div class="theme-toggle" id="theme-btn"><i class="fas fa-moon"></i></div>
        </div>

        <div id="inicio" class="category-section active">
            <h1>Bienvenido, <span id="user-country">Jugador</span></h1>
            <p>Tu moneda actual se ha ajustado automáticamente.</p>
        </div>

        <div id="rangos" class="category-section">
            <h1>Rangos VIP</h1>
            <div class="grid">
                <div class="rank-card">
                    <h2>VIP</h2>
                    <div class="price" data-usd="5.00">$5.00 USD</div>
                    <button class="btn-buy">COMPRAR</button>
                </div>
                <div class="rank-card">
                    <h2>VIP+</h2>
                    <div class="price" data-usd="10.00">$10.00 USD</div>
                    <button class="btn-buy">COMPRAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. LÓGICA DE MONEDA POR PAÍS (IP-API)
        async function updateCurrency() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                const currencyMap = {
                    'PE': { symbol: 'S/', rate: 3.70 }, // Perú
                    'MX': { symbol: '$', rate: 17.00 }, // México
                    'AR': { symbol: '$', rate: 840.00 }, // Argentina
                    'ES': { symbol: '€', rate: 0.92 },  // España
                    'CO': { symbol: '$', rate: 3900.00 } // Colombia
                };

                const userCurrency = currencyMap[data.country_code] || { symbol: '$', rate: 1 };
                document.getElementById('user-country').innerText = `Jugador de ${data.country_name}`;

                document.querySelectorAll('.price').forEach(el => {
                    const usd = parseFloat(el.getAttribute('data-usd'));
                    const localPrice = (usd * userCurrency.rate).toFixed(2);
                    el.innerText = `${userCurrency.symbol}${localPrice} ${data.currency}`;
                });
            } catch (error) {
                console.log("Error al detectar país, usando USD por defecto.");
            }
        }
        updateCurrency();

        // 2. NAVEGACIÓN Y TEMA
        function showCategory(id) {
            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        const themeBtn = document.getElementById('theme-btn');
        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
        });
    </script>
</body>
</html>
