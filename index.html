<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATERNIA MC | OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f0f0f; --card-bg: #1a1a1a; --sidebar-bg: #121212; --text: #ffffff;
            --accent: #00e5e5; --accent-dark: #008b8b; --accent-glow: rgba(0, 229, 229, 0.4);
            --lore-color: #ff7f27;
            --comun: #95a5a6; --raro: #00d2d3; --epico: #8e44ad; 
            --legendary: #f1c40f; --mitico: #c0392b; --exotico: #d63031;
        }

        [data-theme="light"] { --bg: #f4f4f4; --card-bg: #ffffff; --sidebar-bg: #e0e0e0; --text: #333; }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; text-transform: uppercase; transition: 0.3s; min-height: 100vh; overflow-x: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 280px; background-color: var(--sidebar-bg); padding: 40px 20px; position: fixed; height: 100vh; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; transition: 0.4s; }
        
        /* LOGO RESTAURADO AL TAMAÑO ORIGINAL */
        .logo-box { font-size: 2rem; font-weight: 900; text-align: center; margin-bottom: 40px; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo-box img { height: 50px; width: auto; }
        
        .nav-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.4s; color: #888; font-weight: 600; }
        .nav-item:hover { background: rgba(0, 225, 225, 0.1); color: var(--accent); transform: translateX(8px); }
        .nav-item.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: 320px; padding: 60px; width: calc(100% - 320px); transition: 0.4s; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-bottom: 50px; }

        .menu-toggle { display: none; font-size: 1.5rem; color: var(--accent); cursor: pointer; position: fixed; top: 20px; left: 20px; z-index: 1100; background: var(--sidebar-bg); padding: 10px; border-radius: 10px; border: 1px solid var(--accent); }

        /* --- FAQ / COMENTARIOS --- */
        .faq-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border-left: 4px solid var(--accent); margin-bottom: 20px; position: relative; animation: fadeIn 0.5s; }
        .faq-author { color: var(--accent); font-weight: 900; font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .faq-text { text-transform: none; color: #ccc; line-height: 1.6; }
        .faq-actions { margin-top: 15px; display: flex; gap: 15px; }
        .btn-mini { background: none; border: none; color: #555; font-size: 0.7rem; font-weight: 900; cursor: pointer; transition: 0.3s; padding: 0; }
        .btn-mini:hover { color: var(--accent); }
        .btn-delete:hover { color: #ff4757; }

        /* --- UI ELEMENTS --- */
        .btn-action { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn-action:hover { filter: brightness(1.2); transform: translateY(-2px); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); padding: 35px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }

        .category-section { display: none; }
        .category-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 992px) {
            .sidebar { left: -320px; }
            .sidebar.open { left: 0; }
            .main-content { margin-left: 0; width: 100%; padding: 80px 20px; box-sizing: border-box; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-box" onclick="showCategory('inicio')">
            <img src="logo_aternianmc1.png" alt=" ">
            <div><span style="color:var(--accent)">ATERNIA</span><span style="color:var(--accent-dark)">MC</span></div>
        </div>
        <div class="nav-item active" id="nav-inicio" onclick="showCategory('inicio')"><i class="fas fa-home"></i> INICIO</div>
        <div class="nav-item" id="nav-rangos" onclick="showCategory('rangos')"><i class="fas fa-crown"></i> RANGOS EXCLUSIVOS</div>
        <div class="nav-item" id="nav-llaves" onclick="showCategory('llaves')"><i class="fas fa-key"></i> LLAVES/CRATES</div>
        <div class="nav-item" id="nav-donaciones" onclick="showCategory('donaciones')"><i class="fas fa-heart"></i> DONACIONES</div>
        <p style="font-size:0.6rem; color:#444; margin:30px 0 10px 10px; letter-spacing:2px;">COMUNIDAD</p>
        <div class="nav-item" id="nav-staff" onclick="showCategory('staff')"><i class="fas fa-shield-alt"></i> STAFF</div>
        <div class="nav-item" id="nav-faq" onclick="showCategory('faq')"><i class="fas fa-comments"></i> PREGUNTAS / FAQ</div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div id="userLogged" style="display:none; align-items:center; gap:15px; background:rgba(255,255,255,0.05); padding:8px 20px; border-radius:50px; border:1px solid var(--accent);">
                <img id="headImg" src="" style="width:25px; border-radius:3px;">
                <span id="userTag" style="font-weight:900; font-size:0.8rem;"></span>
                <i class="fas fa-power-off" onclick="logout()" style="color:#ff4757; cursor:pointer; font-size:0.9rem;"></i>
            </div>
            <!-- Otros controles como el theme switch aquí -->
        </div>

        <!-- SECCIÓN FAQ CORREGIDA -->
        <div id="faq" class="category-section">
            <h1>PREGUNTAS / <span style="color:var(--accent)">FAQ</span></h1>
            <div style="background:var(--card-bg); padding:20px; border-radius:15px; margin-bottom:30px; border: 1px solid rgba(255,255,255,0.05);">
                <textarea id="faqTxt" style="width:100%; background:transparent; border:none; color:white; outline:none; font-family:inherit; resize: none;" rows="3" placeholder="ESCRIBE TU DUDA..."></textarea>
                <button class="btn-action" style="margin-top: 10px;" onclick="postFaq()">PUBLICAR</button>
            </div>
            <div id="faqList"></div>
        </div>

        <!-- Las demás secciones (inicio, rangos, etc.) se mantienen igual -->
    </div>

    <script>
        // Sistema de carga de FAQ
        let posts = JSON.parse(localStorage.getItem('faqPosts')) || [];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function showCategory(id) {
            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const section = document.getElementById(id);
            if(section) section.classList.add('active');
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
            if(id === 'faq') renderFaq();
        }

        function postFaq() {
            const user = localStorage.getItem('u');
            const text = document.getElementById('faqTxt').value;

            if(!user) { alert("DEBES INICIAR SESIÓN PARA PUBLICAR"); return; }
            if(!text.trim()) return;

            const newPost = {
                id: Date.now(),
                author: user,
                content: text,
                date: new Date().toLocaleString()
            };

            posts.unshift(newPost);
            localStorage.setItem('faqPosts', JSON.stringify(posts));
            document.getElementById('faqTxt').value = '';
            renderFaq();
        }

        function renderFaq() {
            const list = document.getElementById('faqList');
            const currentUser = localStorage.getItem('u');
            list.innerHTML = '';

            posts.forEach(post => {
                const isOwner = currentUser === post.author;
                list.innerHTML += `
                    <div class="faq-card" id="post-${post.id}">
                        <span class="faq-author">${post.author}</span>
                        <div class="faq-text" id="text-${post.id}">${post.content}</div>
                        ${isOwner ? `
                            <div class="faq-actions">
                                <button class="btn-mini" onclick="editPost(${post.id})">EDITAR</button>
                                <button class="btn-mini btn-delete" onclick="deletePost(${post.id})">ELIMINAR</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        }

        function deletePost(id) {
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('faqPosts', JSON.stringify(posts));
            renderFaq();
        }

        function editPost(id) {
            const post = posts.find(p => p.id === id);
            const newText = prompt("EDITA TU PREGUNTA:", post.content);
            if(newText && newText.trim() !== "") {
                post.content = newText;
                localStorage.setItem('faqPosts', JSON.stringify(posts));
                renderFaq();
            }
        }

        window.onload = () => {
            const u = localStorage.getItem('u');
            if(u) {
                document.getElementById('userLogged').style.display = 'flex';
                document.getElementById('userTag').innerText = u;
                document.getElementById('headImg').src = `https://mc-heads.net/avatar/${u}`;
            }
            renderFaq();
        };

        function logout() { localStorage.removeItem('u'); location.reload(); }
    </script>
</body>
</html>
