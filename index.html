<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATERNIA MC | OFICIAL</title>
    
    <!-- CONFIGURACIÓN DEL FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://i.imgur.com/EpxuqFO.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f0f0f; --card-bg: #1a1a1a; --sidebar-bg: #121212; --text: #ffffff;
            --accent: #00e5e5; --accent-dark: #008b8b; --accent-glow: rgba(0, 229, 229, 0.4);
            --lore-color: #ff7f27; 
            --comun: #95a5a6; --raro: #00d2d3; --epico: #8e44ad; 
            --legendary: #f1c40f; --mitico: #c0392b; --exotico: #ad244f;
            --error: #ff4757; --error-glow: rgba(255, 71, 87, 0.4);
        }

        [data-theme="light"] { --bg: #f4f4f4; --card-bg: #ffffff; --sidebar-bg: #e0e0e0; --text: #333; }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; text-transform: uppercase; transition: 0.3s; min-height: 100vh; overflow-x: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background-color: var(--sidebar-bg); padding: 40px 20px 80px 20px; position: fixed; height: 100dvh; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; transition: 0.4s; overflow-y: auto; box-sizing: border-box; }
        .logo-box { font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 40px; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-box img { width: 45px; }
        
        .nav-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; transition: 0.4s; color: #888; font-weight: 600; }
        .nav-item:hover { background: rgba(0, 225, 225, 0.1); color: var(--accent); transform: translateX(8px); }
        .nav-item.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* CONTENIDO PRINCIPAL */
        .main-content { margin-left: 320px; padding: 60px; width: calc(100% - 320px); transition: 0.4s; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-bottom: 50px; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 25px; width: 90%; max-width: 450px; text-align: center; border: 2px solid var(--accent); box-shadow: 0 0 30px var(--accent-glow); animation: modalIn 0.3s; position: relative; box-sizing: border-box; }
        .modal-content h2 { margin-bottom: 25px; color: var(--accent); letter-spacing: 2px; font-size: 1.2rem; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-family: inherit; }

        /* BOTONES */
        .btn-action { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; text-align: center; }
        .btn-action:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-topbar-edit { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--accent); color: var(--text); padding: 8px 15px; border-radius: 50px; font-size: 0.75rem; font-weight: 900; cursor: pointer; display: none; align-items: center; gap: 8px; }

        .category-section { display: none; }
        .category-section.active { display: block; }
        
        .faq-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border-left: 4px solid var(--accent); margin-bottom: 20px; }
        .faq-author { color: var(--accent); font-weight: 900; font-size: 0.8rem; margin-bottom: 8px; display: block; }
        .faq-text { text-transform: none; color: var(--lore-color); font-size: 0.9rem; }

        @media (max-width: 992px) {
            .sidebar { left: -320px; }
            .main-content { margin-left: 0; width: 100%; padding: 80px 20px 40px 20px; }
        }
    </style>
</head>
<body>

    <!-- MODAL INICIO SESIÓN / REGISTRO -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">INICIAR SESIÓN</h2>
            <div id="authInputs">
                <input type="text" id="authUser" placeholder="USUARIO DE MINECRAFT" style="display:none;">
                <input type="email" id="authEmail" placeholder="CORREO ELECTRÓNICO">
                <input type="password" id="authPass" placeholder="CONTRASEÑA">
            </div>
            <button class="btn-action" style="width: 100%;" onclick="handleAuth()">CONTINUAR</button>
            <p onclick="closeAuth()" style="font-size: 0.7rem; color: #555; margin-top: 15px; cursor: pointer;">CANCELAR</p>
        </div>
    </div>

    <!-- MODAL EDITAR PERFIL -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--accent)">EDITAR PERFIL</h2>
            <p style="font-size: 0.7rem; color: #888; margin-bottom: 20px;">CAMBIA TU NICKNAME DE MINECRAFT</p>
            <input type="text" id="editNickInput" placeholder="NUEVO NICKNAME">
            <button class="btn-action" style="width: 100%;" onclick="updateProfile()">GUARDAR CAMBIOS</button>
            <p onclick="closeEditProfile()" style="font-size: 0.7rem; color: #555; margin-top: 15px; cursor: pointer;">CERRAR</p>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo-box" onclick="showCategory('inicio')">
            <img src="https://i.imgur.com/EpxuqFO.png" alt="Logo">
            <span style="color:var(--accent)">ATERNIA</span><span style="color:var(--accent-dark)">MC</span>
        </div>
        <div class="nav-item active" id="nav-inicio" onclick="showCategory('inicio')"><i class="fas fa-home"></i> INICIO</div>
        <div class="nav-item" id="nav-faq" onclick="showCategory('faq')"><i class="fas fa-comments"></i> PREGUNTAS / FAQ</div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <!-- INFO DE USUARIO LOGUEADO -->
            <div id="userLogged" style="display:none; align-items:center; gap:15px; background:rgba(255,255,255,0.05); padding:8px 20px; border-radius:50px; border:1px solid var(--accent);">
                <img id="headImg" src="" style="width:25px; border-radius:3px;">
                <span id="userTag" style="font-weight:900; font-size:0.8rem;"></span>
                <i class="fas fa-power-off" onclick="logout()" style="color:#ff4757; cursor:pointer;"></i>
            </div>

            <!-- BOTÓN EDITAR (SOLO LOGUEADOS) -->
            <button id="btnEditProfile" class="btn-topbar-edit" onclick="openEditProfile()">
                <i class="fas fa-user-edit"></i> EDITAR PERFIL
            </button>

            <!-- BOTONES LOGIN/REGISTRO -->
            <div id="authButtons" style="display: flex; gap: 10px;">
                <button class="btn-action btn-outline" onclick="openAuth('REGISTRARSE')">REGISTRARSE</button>
                <button class="btn-action" onclick="openAuth('INICIAR SESIÓN')">INICIAR SESIÓN</button>
            </div>
        </div>

        <div id="inicio" class="category-section active">
            <h1>BIENVENIDO A <span style="color:var(--accent)">ATERNIA MC</span></h1>
            <div style="background:var(--card-bg); padding:35px; border-radius:20px; text-align:center;">
                <p style="text-transform: none;">Bienvenido a la plataforma oficial de Aternia MC.</p>
            </div>
        </div>

        <div id="faq" class="category-section">
            <h1>PREGUNTAS / <span style="color:var(--accent)">FAQ</span></h1>
            <div id="faqInputContainer" style="display:none; background:var(--card-bg); padding:25px; border-radius:15px; margin-bottom:30px; border: 1px solid rgba(255,255,255,0.05);">
                <textarea id="faqTxt" style="width:100%; background:transparent; border:none; color:white; outline:none; font-family:inherit; resize:none;" rows="3" placeholder="ESCRIBE TU DUDA..."></textarea>
                <button class="btn-action" style="margin-top: 10px;" onclick="postFaq()">PUBLICAR</button>
            </div>
            <div id="faqList"></div>
        </div>
    </div>

    <!-- SDKs DE FIREBASE (Versión 8 para máxima compatibilidad) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCCQ_VYtiZB88PzpbOfA98wGqrG7k4qzSE",
            authDomain: "aterniamc-web.firebaseapp.com",
            projectId: "aterniamc-web",
            storageBucket: "aterniamc-web.firebasestorage.app",
            messagingSenderId: "748766671298",
            appId: "1:748766671298:web:bd934aa81b246b9e0ba65b",
            measurementId: "G-LFB2EN182E"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentAuthType = 'INICIAR SESIÓN';

        function showCategory(id) {
            document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'faq') renderFaq();
        }

        // AUTH LOGIC
        function openAuth(type) {
            currentAuthType = type;
            document.getElementById('modalTitle').innerText = type;
            document.getElementById('authUser').style.display = type === 'REGISTRARSE' ? 'block' : 'none';
            document.getElementById('authModal').style.display = 'flex';
        }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            const nick = document.getElementById('authUser').value;

            try {
                if (currentAuthType === 'REGISTRARSE') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(res.user.uid).set({ nickname: nick });
                    localStorage.setItem('u', nick);
                } else {
                    const res = await auth.signInWithEmailAndPassword(email, pass);
                    const doc = await db.collection('users').doc(res.user.uid).get();
                    localStorage.setItem('u', doc.data().nickname);
                }
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        }

        function logout() { auth.signOut().then(() => { localStorage.removeItem('u'); location.reload(); }); }

        // PERFIL LOGIC
        function openEditProfile() {
            document.getElementById('editNickInput').value = localStorage.getItem('u');
            document.getElementById('editProfileModal').style.display = 'flex';
        }
        function closeEditProfile() { document.getElementById('editProfileModal').style.display = 'none'; }

        async function updateProfile() {
            const newNick = document.getElementById('editNickInput').value;
            if(!newNick.trim()) return;
            const user = auth.currentUser;
            await db.collection('users').doc(user.uid).update({ nickname: newNick });
            localStorage.setItem('u', newNick);
            location.reload();
        }

        // FAQ LOGIC
        async function postFaq() {
            const txt = document.getElementById('faqTxt').value;
            const nick = localStorage.getItem('u');
            if(!txt.trim()) return;
            await db.collection('faq').add({ author: nick, content: txt, timestamp: Date.now() });
            document.getElementById('faqTxt').value = '';
        }

        function renderFaq() {
            const list = document.getElementById('faqList');
            db.collection('faq').orderBy('timestamp', 'desc').onSnapshot(snap => {
                list.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    list.innerHTML += `<div class="faq-card"><span class="faq-author">${p.author}</span><div class="faq-text">${p.content}</div></div>`;
                });
            });
        }

        // ESTADO INICIAL
        auth.onAuthStateChanged(user => {
            if(user) {
                const u = localStorage.getItem('u');
                document.getElementById('authButtons').style.display = 'none';
                document.getElementById('userLogged').style.display = 'flex';
                document.getElementById('btnEditProfile').style.display = 'flex';
                document.getElementById('userTag').innerText = u;
                document.getElementById('headImg').src = `https://mc-heads.net/avatar/${u}`;
                document.getElementById('faqInputContainer').style.display = 'block';
            }
        });
    </script>
</body>
</html>
